name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  # ── Job 1: Secret & Dependency Scanning ─────────────────────────────────────
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required for gitleaks

      # Secret leak detection — scans git history for leaked API keys, tokens, etc.
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Dependency vulnerability audit
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix framework-mcp/dashboard

      - name: Dependency Vulnerability Audit
        run: npm audit --audit-level=high

  # ── Job 2: SAST — Static Application Security Testing ───────────────────────
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Focus CodeQL on security-critical queries
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ── Job 3: Build, Lint, Test ─────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: security-scan   # Only run if security scan passes

    strategy:
      matrix:
        node-version: [ 20.x, 22.x ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix framework-mcp/dashboard

      - name: Build TypeScript project
        run: npm run build

      - name: Lint check
        run: npm run lint

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: Run Discipline Rules Check (Atabey Compliance)
        run: npm run atabey:check

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '22.x'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
